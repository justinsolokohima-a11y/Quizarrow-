<style>
:root {

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: var(--bg); color: var(--text); font-size: 16px; line-height: 1.55; -webkit-font-smoothing: antialiased; }
.container { max-width: 720px; margin: 0 auto; padding: 24px 16px 64px; }
header { text-align: center; margin-bottom: 32px; }
.brand { display: inline-flex; align-items: center; gap: 10px; font-weight: 700; font-size: 18px; color: var(--brand-primary); letter-spacing: 0.3px; }
.brand-mark { width: 32px; height: 32px; border-radius: 50%; background: var(--brand-primary); border: 2px solid var(--brand-accent); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 13px; }
.tagline { margin-top: 4px; font-size: 13px; color: var(--text-muted); letter-spacing: 0.5px; text-transform: uppercase; }
.card { background: var(--card); border-radius: 12px; padding: 32px 28px; box-shadow: var(--shadow); border: 1px solid var(--border); }
.step { display: none; }
.step.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
h1 { font-size: 28px; line-height: 1.25; color: var(--brand-primary); margin-bottom: 16px; font-weight: 700; }
h2 { font-size: 22px; line-height: 1.3; color: var(--brand-primary); margin-bottom: 20px; font-weight: 700; }
.lede { font-size: 17px; color: var(--text-muted); margin-bottom: 24px; }
.progress-strip { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 24px; }

.step-label { font-size: 12px; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-muted); font-weight: 600; margin-bottom: 8px; }

.option:hover { border-color: var(--brand-accent); background: white; }

.btn-primary { background: var(--brand-accent); color: white; }
.btn-primary:hover { background: var(--brand-accent-dark); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-secondary { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
.btn-secondary:hover { color: var(--brand-primary); border-color: var(--brand-primary); }
.intro-meta { display: flex; gap: 24px; margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border); font-size: 14px; color: var(--text-muted); }
.intro-meta-item { display: flex; align-items: center; gap: 6px; }

.score-display { text-align: center; padding: 24px 0; }
.score-number { font-size: 72px; font-weight: 800; line-height: 1; margin-bottom: 8px; }
.score-band-label { display: inline-block; padding: 6px 16px; border-radius: 999px; font-size: 13px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: white; margin-bottom: 16px; }
.score-out-of { color: var(--text-muted); font-size: 18px; font-weight: 500; }
.summary-text { font-size: 16px; margin: 24px 0; padding: 20px; background: var(--bg); border-left: 3px solid var(--brand-accent); border-radius: 4px; }
.factors-title { font-weight: 700; font-size: 16px; margin: 28px 0 12px; color: var(--brand-primary); }
.factor-list { list-style: none; }
.factor-list li { padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 15px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
.factor-list li:last-child { border-bottom: none; }
.factor-label { flex: 1; }
.factor-points { font-size: 13px; font-weight: 700; padding: 3px 10px; border-radius: 4px; white-space: nowrap; }
.cta-block { margin-top: 32px; padding: 28px; background: linear-gradient(135deg, var(--brand-primary) 0%, var(--brand-primary-light) 100%); color: white; border-radius: 12px; }
.cta-block h3 { font-size: 20px; margin-bottom: 8px; color: white; }
.cta-block p { color: rgba(255,255,255,0.85); margin-bottom: 20px; font-size: 15px; }
.cta-row { display: flex; gap: 12px; flex-wrap: wrap; }
.cta-btn { display: inline-block; padding: 14px 22px; border-radius: 8px; font-weight: 700; text-decoration: none; font-size: 14px; text-align: center; transition: all 0.15s ease; }
.cta-primary-link { background: var(--brand-accent); color: white; flex: 1; min-width: 220px; }
.cta-primary-link:hover { background: var(--brand-accent-dark); }
.cta-secondary-link { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.3); flex: 1; min-width: 220px; }
.cta-secondary-link:hover { border-color: white; background: rgba(255,255,255,0.06); }
.math-block { margin-top: 24px; padding: 16px; background: rgba(var(--brand-accent-rgb), 0.12); border-radius: 8px; font-size: 14px; color: #d1fae5; }
.math-block strong { color: #6ee7b7; }
@media (max-width: 600px) {
  .card { padding: 24px 20px; }
  h1 { font-size: 24px; }

  .score-number { font-size: 56px; }
  .intro-meta { flex-direction: column; gap: 8px; }
  .cta-row { flex-direction: column; }
  .cta-primary-link, .cta-secondary-link { min-width: 0; }
}

function assignBand(score) { for (const band of CONFIG.bands) { if (score >= band.min && score <= band.max) return band; } return CONFIG.bands[CONFIG.bands.length - 1]; }
function calculateScore() { const factors = []; let total = 0; CONFIG.questions.forEach(q => { const val = answers[q.id]; if (!val) return; const opt = (q.options || []).find(o => o.value === val); if (opt) { total += opt.points; factors.push({ label: opt.label, points: opt.points, reason: opt.reason || "" }); } }); total = Math.max(0, Math.min(100, total)); const band = assignBand(total); return { total, band, factors }; }
function showResults() { navigate(STEPS.indexOf("results")); renderResults(); }
function renderResults() {
  const { total, band, factors } = calculateScore();
  const copy = CONFIG.results[band.key];
  if (!copy) return;
  const numEl = document.getElementById("scoreNumber");
  numEl.innerHTML = total + '<span class="score-out-of"> / 100</span>';
  numEl.style.color = band.color;
  const bandEl = document.getElementById("scoreBandLabel");
  bandEl.textContent = band.label; bandEl.style.background = band.color;
  document.getElementById("summaryText").innerHTML = copy.summary;
  const list = document.getElementById("factorList");
  list.innerHTML = "";
  const working = factors.filter(f => f.points <= 8);
  const gaps = factors.filter(f => f.points > 8);
  if (working.length > 0) {
    const wtitle = document.createElement("div");
    wtitle.style.cssText = "font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:#10b981;margin-bottom:8px;";
    wtitle.textContent = "What's working"; list.appendChild(wtitle);
    working.forEach(f => { const li = document.createElement("li"); li.innerHTML = `<div class="factor-label"><strong>${f.label}</strong>${f.reason ? `<br><span style="color:var(--text-muted);font-size:14px;">${f.reason}</span>` : ""}</div><span class="factor-points" style="background:rgba(16,185,129,0.1);color:#10b981;">✓ good</span>`; list.appendChild(li); });
  }
  if (gaps.length > 0) {
    const gtitle = document.createElement("div");
    gtitle.style.cssText = "font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-top:" + (working.length > 0 ? "20px" : "0") + ";margin-bottom:8px;";
    gtitle.textContent = "Where to focus"; list.appendChild(gtitle);
    gaps.forEach(f => { const severity = f.points >= 20 ? "#dc2626" : "#ea580c"; const slabel = f.points >= 20 ? "high" : "medium"; const li = document.createElement("li"); li.innerHTML = `<div class="factor-label"><strong>${f.label}</strong>${f.reason ? `<br><span style="color:var(--text-muted);font-size:14px;">${f.reason}</span>` : ""}</div><span class="factor-points" style="background:rgba(220,38,38,0.1);color:${severity};">${slabel}</span>`; list.appendChild(li); });
  }
  document.getElementById("ctaHeadline").textContent = copy.ctaHeadline;
  document.getElementById("ctaSubhead").textContent = copy.ctaSubhead;
  document.getElementById("ctaRow").innerHTML = `<a href="${copy.primaryUrl}" target="_blank" class="cta-btn cta-primary-link">${copy.primaryLabel} →</a><a href="${copy.secondaryUrl}" target="_blank" class="cta-btn cta-secondary-link">${copy.secondaryLabel}</a>`;
  const mathEl = document.getElementById("mathBlock");
  mathEl.innerHTML = copy.math || ""; mathEl.style.display = copy.math ? "block" : "none";
}
function restart() { CONFIG.questions.forEach(q => { answers[q.id] = null; }); document.querySelectorAll("input[type=radio]").forEach(i => i.checked = false); document.querySelectorAll(".option.selected").forEach(o => o.classList.remove("selected")); document.querySelectorAll("[id^='btn-next-q']").forEach(b => { b.disabled = true; }); const card = document.getElementById("quiz-card"); const oldResults = document.getElementById("step-results"); if (oldResults) card.replaceChild(buildResultsSection(), oldResults); navigate(0); }
applyBrand();
buildQuiz();
</script>
</body>
