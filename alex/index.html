<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title"></title>
<meta name="description" id="page-desc" content="">
<style>
:root {
  --brand-primary:       #0a2540;
  --brand-primary-light: #1a3556;
  --brand-accent:        #00b3a4;
  --brand-accent-dark:   #008f82;
  --brand-accent-rgb:    0, 179, 164;
  --bg:                  #f7f9fc;
  --card:                #ffffff;
  --text:                #1a1a2e;
  --text-muted:          #5a6478;
  --border:              #e2e8f0;
  --shadow:              0 4px 20px rgba(10, 37, 64, 0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}
.container { max-width: 720px; margin: 0 auto; padding: 24px 16px 64px; }
header { text-align: center; margin-bottom: 32px; }
.brand {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  font-size: 18px;
  color: var(--brand-primary);
  letter-spacing: 0.3px;
}
.brand-mark {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--brand-primary);
  border: 2px solid var(--brand-accent);
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 700; font-size: 13px;
}
.tagline {
  margin-top: 4px;
  font-size: 13px;
  color: var(--text-muted);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.card {
  background: var(--card);
  border-radius: 12px;
  padding: 32px 28px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}
.step { display: none; }
.step.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
h1 { font-size: 28px; line-height: 1.25; color: var(--brand-primary); margin-bottom: 16px; font-weight: 700; }
h2 { font-size: 22px; line-height: 1.3;  color: var(--brand-primary); margin-bottom: 20px; font-weight: 700; }
.lede { font-size: 17px; color: var(--text-muted); margin-bottom: 24px; }
.progress-strip { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 24px; }
.progress-fill { height: 100%; background: var(--brand-accent); transition: width 0.3s ease; border-radius: 2px; }
.step-label { font-size: 12px; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-muted); font-weight: 600; margin-bottom: 8px; }
label.q-label { display: block; font-weight: 600; margin: 16px 0 12px; color: var(--brand-primary); font-size: 15px; }
.hint { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; font-style: italic; }
.option-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.option {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 14px 16px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s ease;
  font-size: 15px;
}
.option:hover { border-color: var(--brand-accent); background: white; }
.option input { margin-top: 4px; cursor: pointer; accent-color: var(--brand-accent); }
.option.selected {
  border-color: var(--brand-accent);
  background: rgba(var(--brand-accent-rgb), 0.06);
}
select, input[type="text"], input[type="email"] {
  width: 100%; padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 15px; font-family: inherit;
  background: white; color: var(--text);
}
select:focus, input:focus {
  outline: none;
  border-color: var(--brand-accent);
  box-shadow: 0 0 0 3px rgba(var(--brand-accent-rgb), 0.15);
}
.btn-row { display: flex; gap: 12px; margin-top: 24px; align-items: center; }
.btn { padding: 14px 24px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s ease; }
.btn-primary { background: var(--brand-accent); color: white; }
.btn-primary:hover { background: var(--brand-accent-dark); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-secondary { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
.btn-secondary:hover { color: var(--brand-primary); border-color: var(--brand-primary); }
.intro-meta { display: flex; gap: 24px; margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border); font-size: 14px; color: var(--text-muted); }
.intro-meta-item { display: flex; align-items: center; gap: 6px; }
.footer-disclaimer { text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 24px; max-width: 600px; margin-left: auto; margin-right: auto; line-height: 1.5; }

.score-display { text-align: center; padding: 24px 0; }
.score-number { font-size: 72px; font-weight: 800; line-height: 1; margin-bottom: 8px; }
.score-band-label { display: inline-block; padding: 6px 16px; border-radius: 999px; font-size: 13px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: white; margin-bottom: 16px; }
.score-out-of { color: var(--text-muted); font-size: 18px; font-weight: 500; }
.summary-text { font-size: 16px; margin: 24px 0; padding: 20px; background: var(--bg); border-left: 3px solid var(--brand-accent); border-radius: 4px; }
.factors-title { font-weight: 700; font-size: 16px; margin: 28px 0 12px; color: var(--brand-primary); }
.factor-list { list-style: none; }
.factor-list li { padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 15px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
.factor-list li:last-child { border-bottom: none; }
.factor-label { flex: 1; }
.factor-points { font-size: 13px; font-weight: 700; padding: 3px 10px; border-radius: 4px; white-space: nowrap; }
.factor-points.positive { background: rgba(220,38,38,0.1);  color: #dc2626; }
.factor-points.negative { background: rgba(22,163,74,0.1);   color: #16a34a; }
.factor-points.neutral  { background: rgba(90,100,120,0.1);  color: var(--text-muted); }
.cta-block { margin-top: 32px; padding: 28px; background: linear-gradient(135deg, var(--brand-primary) 0%, var(--brand-primary-light) 100%); color: white; border-radius: 12px; }
.cta-block h3 { font-size: 20px; margin-bottom: 8px; color: white; }
.cta-block p  { color: rgba(255,255,255,0.85); margin-bottom: 20px; font-size: 15px; }
.cta-row { display: flex; gap: 12px; flex-wrap: wrap; }
.cta-btn { display: inline-block; padding: 14px 22px; border-radius: 8px; font-weight: 700; text-decoration: none; font-size: 14px; text-align: center; transition: all 0.15s ease; }
.cta-primary-link   { background: var(--brand-accent); color: white; flex: 1; min-width: 220px; }
.cta-primary-link:hover { background: var(--brand-accent-dark); }
.cta-secondary-link { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.3); flex: 1; min-width: 220px; }
.cta-secondary-link:hover { border-color: white; background: rgba(255,255,255,0.06); }
.math-block { margin-top: 24px; padding: 16px; background: rgba(var(--brand-accent-rgb), 0.08); border-radius: 8px; font-size: 14px; color: #e0f7f5; }
.math-block strong { color: #7eeee8; }
.email-form .label-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; color: var(--text-muted); }
.email-form input { margin-bottom: 14px; }
.email-form .required-mark { color: #dc2626; }
.privacy-note { font-size: 12px; color: var(--text-muted); margin-top: 12px; line-height: 1.5; }

@media (max-width: 600px) {
  .card { padding: 24px 20px; }
  h1 { font-size: 24px; }
  h2 { font-size: 19px; }
  .score-number { font-size: 56px; }
  .intro-meta { flex-direction: column; gap: 8px; }
  .cta-row { flex-direction: column; }
  .cta-primary-link, .cta-secondary-link { min-width: 0; }
}
</style>
<script async src="https://tally.so/widgets/embed.js"></script>

const answers = {};
CONFIG.questions.forEach(q => { answers[q.id] = q.type === "checkbox" ? [] : null; });
const STEPS = ["intro", ...CONFIG.questions.map((_, i) => "q" + i), "results"];
let currentStepIdx = 0;

function hexToRgb(hex) {
  const clean = hex.replace("#", "");
  return `${parseInt(clean.slice(0,2),16)}, ${parseInt(clean.slice(2,4),16)}, ${parseInt(clean.slice(4,6),16)}`;
}

function applyBrand() {
  const c = CONFIG.brand.colors;
  const r = document.documentElement;
  r.style.setProperty("--brand-primary",       c.primary);
  r.style.setProperty("--brand-primary-light",  c.primaryLight);
  r.style.setProperty("--brand-accent",         c.accent);
  r.style.setProperty("--brand-accent-dark",    c.accentDark);
  r.style.setProperty("--brand-accent-rgb",     hexToRgb(c.accent));
  r.style.setProperty("--bg",                   c.bg);
  r.style.setProperty("--card",                 c.card);
  r.style.setProperty("--text",                 c.text);
  r.style.setProperty("--text-muted",           c.textMuted);
  r.style.setProperty("--border",               c.border);
  document.getElementById("page-title").textContent = CONFIG.meta.pageTitle;
  document.getElementById("page-desc").setAttribute("content", CONFIG.meta.pageDesc);
  document.getElementById("footer-disclaimer").textContent = CONFIG.meta.footerNote;
  document.getElementById("brand-tagline").textContent = CONFIG.brand.tagline;
  const mark = CONFIG.brand.logoUrl
    ? `<img src="${CONFIG.brand.logoUrl}" style="width:32px;height:32px;object-fit:contain;border-radius:4px;" alt="${CONFIG.brand.name} logo">`
    : `<div class="brand-mark">${CONFIG.brand.initials}</div>`;
  document.getElementById("brand-header").innerHTML = `${mark}<span>${CONFIG.brand.name}</span>`;
}

function buildQuiz() {
  const card = document.getElementById("quiz-card");
  card.innerHTML = "";
  card.appendChild(buildIntroSection());
  CONFIG.questions.forEach((q, i) => card.appendChild(buildQuestionSection(q, i)));
  card.appendChild(buildResultsSection());
}

function buildIntroSection() {
  const s = document.createElement("section");
  s.id = "step-intro"; s.className = "step active";
  const trustHtml = CONFIG.intro.trustItems.map(t => `<div class="intro-meta-item">${t}</div>`).join("");
  s.innerHTML = `
    <h1>${CONFIG.intro.headline}</h1>
    <p class="lede">${CONFIG.intro.lede}</p>
    <div class="btn-row"><button class="btn btn-primary" onclick="navigate(1)">${CONFIG.intro.ctaLabel}</button></div>
    <div class="intro-meta">${trustHtml}</div>`;
  return s;
}

function buildQuestionSection(q, i) {
  const stepIdx = i + 1, totalQ = CONFIG.questions.length;
  const pct = Math.round((stepIdx / (totalQ + 1)) * 100);
  const isLast = i === totalQ - 1;
  const nextLabel = isLast ? "See my score" : "Next";
  const nextDisabled = q.type !== "checkbox" ? "disabled" : "";
  let inputHtml = "";
  if (q.type === "radio") {
    const opts = (q.options || []).map(o => `
      <label class="option">
        <input type="radio" name="radio-${q.id}" value="${o.value}" onchange="onRadioAnswer('${q.id}', ${i}, '${o.value}')">
        ${o.label}
      </label>`).join("");
    inputHtml = `<label class="q-label">${q.label || ""}</label><div class="option-group" id="group-${q.id}">${opts}</div>`;
  } else if (q.type === "checkbox") {
    const opts = (q.options || []).map(o => `
      <label class="option">
        <input type="checkbox" value="${o.value}" ${o.exclusive ? 'data-exclusive="true"' : ""} onchange="onCheckboxAnswer('${q.id}', event)">
        ${o.label}
      </label>`).join("");
    inputHtml = `<label class="q-label">${q.label || ""}</label><div class="option-group" id="group-${q.id}">${opts}</div>`;
  }
  const hintHtml = q.hint ? `<p class="hint">${q.hint}</p>` : "";
  const s = document.createElement("section");
  s.id = "step-q" + i; s.className = "step";
  s.innerHTML = `
    <div class="progress-strip"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="step-label">Question ${stepIdx} of ${totalQ}</div>
    <h2>${q.headline}</h2>
    ${hintHtml}${inputHtml}
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="navigate(${stepIdx - 1})">Back</button>
      <button class="btn btn-primary" id="btn-next-q${i}" ${nextDisabled}
        onclick="${isLast ? "showResults()" : "navigate(" + (stepIdx + 1) + ")"}">${nextLabel}</button>
    </div>`;
  return s;
}

function buildResultsSection() {
  const ec = CONFIG.emailCapture;
  const fieldsHtml = (ec.fields || []).map(f => `
    <div class="label-row">
      <span>${f.label}${f.required ? ' <span class="required-mark">*</span>' : ""}</span>
      ${!f.required ? "<span>optional</span>" : ""}
    </div>
    <input type="${f.type}" id="lead-${f.id}" ${f.required ? "required" : ""} placeholder="${f.placeholder || ""}">`).join("");
  const s = document.createElement("section");
  s.id = "step-results"; s.className = "step";
  s.innerHTML = `
    <div class="score-display">
      <div class="step-label">${CONFIG.meta.scoreLabel}</div>
      <div class="score-number" id="scoreNumber">—<span class="score-out-of"> / 100</span></div>
      <div class="score-band-label" id="scoreBandLabel">—</div>
    </div>
    <div class="summary-text" id="summaryText"></div>
    

    <ul class="factor-list" id="factorList"></ul>
    <div class="cta-block">
      <h3 id="ctaHeadline"></h3>
      <p id="ctaSubhead"></p>
      <div class="cta-row" id="ctaRow"></div>
      <div class="math-block" id="mathBlock" style="display:none;"></div>
    </div>
        <div id="emailCaptureWrap" style="margin-top:32px;padding:28px;background:var(--bg);border:1px solid var(--border);border-radius:12px;text-align:center;">
      <h3 style="font-size:18px;color:var(--brand-primary);margin-bottom:8px;">Get your results sent to your inbox</h3>
      <p style="font-size:15px;color:var(--text-muted);margin-bottom:20px;">Takes 30 seconds. We'll send a breakdown of your score and the highest-leverage next step.</p>
      <button data-tally-open="Pdk9WV" data-tally-width="500" data-tally-emoji-text="👋" data-tally-emoji-animation="wave" class="btn btn-primary" style="font-size:16px;padding:16px 32px;">Get my results →</button>
      <p style="font-size:12px;color:var(--text-muted);margin-top:12px;">No spam. Takes 30 seconds.</p>
    </div>
    <div class="btn-row" style="justify-content:center;margin-top:24px;">
      <button class="btn btn-secondary" onclick="restart()">Retake assessment</button>
    </div>`;
  return s;
}

function navigate(targetIdx) {
  document.querySelectorAll(".step").forEach(el => el.classList.remove("active"));
  const stepId = STEPS[targetIdx];
  let el;
  if      (stepId === "intro")   el = document.getElementById("step-intro");
  else if (stepId === "results") el = document.getElementById("step-results");
  else { const qIdx = parseInt(stepId.replace("q",""),10); el = document.getElementById("step-q"+qIdx); }
  if (el) { el.classList.add("active"); currentStepIdx = targetIdx; window.scrollTo({top:0,behavior:"smooth"}); }
}

function onRadioAnswer(qId, qIdx, value) {
  answers[qId] = value;
  const btn = document.getElementById("btn-next-q" + qIdx);
  if (btn) btn.disabled = false;
  const group = document.getElementById("group-" + qId);
  if (group) {
    group.querySelectorAll(".option").forEach(o => o.classList.remove("selected"));
    const inp = group.querySelector(`input[value="${value}"]`);
    if (inp) inp.closest(".option").classList.add("selected");
  }
}

function onCheckboxAnswer(qId, ev) {
  const group = document.getElementById("group-" + qId);
  const target = ev.target;
  if (target.checked) {
    if (target.dataset.exclusive) {
      group.querySelectorAll("input[type=checkbox]").forEach(cb => {
        if (cb !== target) { cb.checked = false; cb.closest(".option").classList.remove("selected"); }
      });
    } else {
      group.querySelectorAll("input[data-exclusive]").forEach(cb => { cb.checked = false; cb.closest(".option").classList.remove("selected"); });
    }
  }
  group.querySelectorAll(".option").forEach(o => {
    const inp = o.querySelector("input");
    inp.checked ? o.classList.add("selected") : o.classList.remove("selected");
  });
  answers[qId] = Array.from(group.querySelectorAll("input:checked")).map(i => i.value);
}

function assignBand(score) {
  for (const band of CONFIG.bands) { if (score >= band.min && score <= band.max) return band; }
  return CONFIG.bands[CONFIG.bands.length - 1];
}

function calculateScore() {
  const factors = []; let total = 0;
  CONFIG.questions.forEach(q => {
    if (q.type === "checkbox") {
      const vals = answers[q.id] || [];
      vals.forEach(val => {
        const opt = (q.options || []).find(o => o.value === val);
        if (opt) { total += opt.points; factors.push({ label: opt.label, points: opt.points, reason: opt.reason || "" }); }
      });
    } else {
      const val = answers[q.id];
      if (!val) return;
      const opt = (q.options || []).find(o => o.value === val);
      if (opt) { total += opt.points; factors.push({ label: opt.label, points: opt.points, reason: opt.reason || "" }); }
    }
  });
  total = Math.max(0, Math.min(100, total));
  const band = assignBand(total);
  return { total, band, factors };
}

function showResults() { navigate(STEPS.indexOf("results")); renderResults(); }

function renderResults() {
  const { total, band, factors } = calculateScore();
  const copy = CONFIG.results[band.key];
  if (!copy) return;
  const numEl = document.getElementById("scoreNumber");
  numEl.innerHTML = total + '<span class="score-out-of"> / 100</span>';
  numEl.style.color = band.color;
  const bandEl = document.getElementById("scoreBandLabel");
  bandEl.textContent = band.label; bandEl.style.background = band.color;
  document.getElementById("summaryText").innerHTML = copy.summary;
  const list = document.getElementById("factorList");
  list.innerHTML = "";
  const working = factors.filter(f => f.points <= 8);
  const gaps = factors.filter(f => f.points > 8);
  if (working.length > 0) {
    const wtitle = document.createElement("div");
    wtitle.className = "factors-title";
    wtitle.style.color = "#16a34a";
    wtitle.textContent = "What\'s working";
    list.appendChild(wtitle);
    working.forEach(f => {
      const li = document.createElement("li");
      li.innerHTML = `<div class="factor-label"><strong>${f.label}</strong>${f.reason ? `<br><span style="color:var(--text-muted);font-size:14px;">${f.reason}</span>` : ""}</div><span class="factor-points negative">✓</span>`;
      list.appendChild(li);
    });
  }
  if (gaps.length > 0) {
    const gtitle = document.createElement("div");
    gtitle.className = "factors-title";
    gtitle.style.marginTop = "20px";
    gtitle.textContent = "Where to focus";
    list.appendChild(gtitle);
    gaps.forEach(f => {
      const li = document.createElement("li");
      li.innerHTML = `<div class="factor-label"><strong>${f.label}</strong>${f.reason ? `<br><span style="color:var(--text-muted);font-size:14px;">${f.reason}</span>` : ""}</div><span class="factor-points positive">gap</span>`;
      list.appendChild(li);
    });
  }
  document.getElementById("ctaHeadline").textContent = copy.ctaHeadline;
  document.getElementById("ctaSubhead").textContent  = copy.ctaSubhead;
  document.getElementById("ctaRow").innerHTML = `
    <a href="${copy.primaryUrl}" target="_blank" class="cta-btn cta-primary-link">${copy.primaryLabel} →</a>
    <a href="${copy.secondaryUrl}" target="_blank" class="cta-btn cta-secondary-link">${copy.secondaryLabel}</a>`;
  const mathEl = document.getElementById("mathBlock");
  mathEl.innerHTML = copy.math || ""; mathEl.style.display = copy.math ? "block" : "none";
}

function submitLead(e) {
  e.preventDefault();
  const payload = { submittedAt: new Date().toISOString() };
  (CONFIG.emailCapture.fields || []).forEach(f => {
    const el = document.getElementById("lead-" + f.id);
    if (el) payload[f.id] = el.value;
  });
  const { total, band } = calculateScore();
  payload.score = total; payload.band = band.key;
  CONFIG.questions.forEach(q => { payload["answer_" + q.id] = Array.isArray(answers[q.id]) ? answers[q.id].join(",") : (answers[q.id] || ""); });
  fetch(CONFIG.emailCapture.endpoint, { method: "POST", headers: { "Content-Type": "application/json", "Accept": "application/json" }, body: JSON.stringify(payload) }).catch(() => {});
  const wrap = document.getElementById("emailCaptureWrap");
  if (wrap) wrap.innerHTML = `<p style="text-align:center;font-size:16px;color:var(--brand-primary);padding:12px 0;">✓ ${CONFIG.emailCapture.thankYou}</p>`;
}

function restart() {
  CONFIG.questions.forEach(q => { answers[q.id] = q.type === "checkbox" ? [] : null; });
  document.querySelectorAll("input[type=radio], input[type=checkbox]").forEach(i => i.checked = false);
  document.querySelectorAll(".option.selected").forEach(o => o.classList.remove("selected"));
  document.querySelectorAll("[id^='btn-next-q']").forEach(b => {
    const qIdx = parseInt(b.id.replace("btn-next-q",""),10);
    const q = CONFIG.questions[qIdx];
    if (q) b.disabled = q.type !== "checkbox";
  });
  const card = document.getElementById("quiz-card");
  const oldResults = document.getElementById("step-results");
  if (oldResults) card.replaceChild(buildResultsSection(), oldResults);
  navigate(0);
}

applyBrand();
buildQuiz();
</script>
</body>
</html>
